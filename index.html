<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم - الناس للناس</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f4f7f6; display: flex; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; position: fixed; padding: 20px; }
        .sidebar h2 { color: #ecf0f1; text-align: center; }
        .main-content { margin-right: 250px; padding: 30px; width: 100%; }
        .table-section { margin-top: 30px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 300px; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #dee2e6; text-align: right; }
        .btn-add { background-color: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .btn-del { background-color: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
        
        .status-pending { background-color: #f1c40f; color: white; padding: 5px; border-radius: 4px; border: none; cursor: pointer; }
        .status-done { background-color: #27ae60; color: white; padding: 5px; border-radius: 4px; border: none; cursor: pointer; }

        /* تعديلات التجاوب مع الهاتف */
        @media screen and (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; position: relative; padding: 10px; box-sizing: border-box; }
            .main-content { margin-right: 0; padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>الناس للناس</h2>
    </div>

    <div class="main-content">
        <h1>لوحة تحكم المدير</h1>
        
        <div class="table-section">
            <button class="btn-add" onclick="document.getElementById('myModal').style.display='flex'">+ إضافة حالة</button>
            <table id="myTable">
                <thead>
                    <tr style="background-color: #f8f9fa;">
                        <th>الاسم</th>
                        <th>الحالة</th>
                        <th>الإجراءات</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="myModal" class="modal">
        <div class="modal-content">
            <h3>إضافة حالة جديدة</h3>
            <input type="text" id="nameInput" placeholder="اسم الحالة" style="width: 90%; padding: 10px; margin-bottom: 10px;">
            <br>
            <button onclick="addRow()" class="btn-add">حفظ</button>
            <button onclick="document.getElementById('myModal').style.display='none'" style="padding: 10px 20px; cursor: pointer;">إغلاق</button>
        </div>
    </div>

    <script>
        window.onload = function() {
            let savedData = JSON.parse(localStorage.getItem('myTableData')) || [];
            savedData.forEach(item => {
                insertRowToTable(item.name, item.status);
            });
        };

        function insertRowToTable(name, status) {
            let table = document.getElementById("myTable").getElementsByTagName('tbody')[0];
            let newRow = table.insertRow();
            newRow.insertCell(0).innerHTML = name;
            newRow.insertCell(1).innerHTML = createSelect(status);
            newRow.insertCell(2).innerHTML = `<button class="btn-del" onclick="deleteRow(this)">حذف</button>`;
        }

        function createSelect(status) {
            return `
                <select onchange="updateColor(this)" class="${status}">
                    <option value="status-pending" ${status === 'status-pending' ? 'selected' : ''}>قيد المعالجة</option>
                    <option value="status-done" ${status === 'status-done' ? 'selected' : ''}>تم الإنجاز</option>
                </select>
            `;
        }

        function addRow() {
            let name = document.getElementById('nameInput').value;
            if(name === "") return;
            insertRowToTable(name, "status-pending");
            saveData();
            document.getElementById('myModal').style.display = 'none';
            document.getElementById('nameInput').value = "";
        }

        function deleteRow(btn) {
            btn.parentNode.parentNode.remove();
            saveData();
        }

        function updateColor(selectElement) {
            selectElement.className = selectElement.value;
            saveData();
        }

        function saveData() {
            let table = document.getElementById("myTable");
            let data = [];
            for (let i = 1; i < table.rows.length; i++) {
                data.push({
                    name: table.rows[i].cells[0].innerHTML,
                    status: table.rows[i].cells[1].querySelector('select').value
                });
            }
            localStorage.setItem('myTableData', JSON.stringify(data));
        }
    </script>
</body>
</html>
